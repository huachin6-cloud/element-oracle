<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>四元素占卜 - Element Oracle</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
            min-height: 100vh;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
        }
        p {
            opacity: 0.8;
            margin-bottom: 20px;
            font-size: 16px;
        }
        button {
            padding: 16px 28px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: #6366f1;
            color: white;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        button:active {
            transform: scale(0.98);
        }
        .card {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .card.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 15px;
            background: rgba(99, 102, 241, 0.1);
            padding: 10px;
        }
        .element {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #6366f1;
        }
        .meaning {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>✨ 四元素占卜</h1>
    <p>選擇一個元素，探索你的能量</p>
    <button onclick="drawElement()">🎴 抽取占卜卡</button>
    
    <div class="card" id="card">
        <img id="cardImg" src="" alt="">
        <div class="element" id="cardName"></div>
        <div class="meaning" id="cardMeaning"></div>
    </div>

    <script>
        const elements = [
            {
                name: "🌍 地",
                image: "https://drive.google.com/uc?export=view&id=1AH-4-2wYxXGtVZN0Odqhn_2OC0VV6cc1",
                meaning: "穩定、踏實、根基\n\n地元素代表穩定性和實際行動。當你抽到地時，這提示你需要建立堅實的基礎，專注於實際的努力和行動。這是一個關於耐心和長期承諾的訊息。"
            },
            {
                name: "💧 水",
                image: "https://drive.google.com/uc?export=view&id=1kcPdG56Br29K63ows6udWTCOubMVJRUo",
                meaning: "流動、情感、直覺\n\n水元素代表情感和直覺的流動。當你抽到水時，這邀請你信任你的感受和內在智慧。這是一個關於靈活性和適應變化的訊息。"
            },
            {
                name: "🔥 火",
                image: "https://drive.google.com/uc?export=view&id=1McWH5vy4J-iazjdqXkbgU8kbjF30Bt_n",
                meaning: "熱情、轉變、能量\n\n火元素代表熱情和轉變的力量。當你抽到火時，這啟發你點燃內在的火焰，追求你的夢想。這是一個關於勇氣和行動的訊息。"
            },
            {
                name: "🌬️ 風",
                image: "https://drive.google.com/uc?export=view&id=185gecPDKj68G5QLezinn_U47UB70xIFu",
                meaning: "思考、溝通、清晰\n\n風元素代表思考和溝通的力量。當你抽到風時，這促進你清晰表達自己，尋求新的觀點。這是一個關於知識和連接的訊息。"
            }
        ];

        function drawElement() {
            const random = Math.floor(Math.random() * elements.length);
            const card = elements[random];
            
            const cardElement = document.getElementById("card");
            cardElement.classList.remove("show");
            
            setTimeout(() => {
                document.getElementById("cardImg").src = card.image;
                document.getElementById("cardName").innerText = card.name;
                document.getElementById("cardMeaning").innerText = card.meaning;
                cardElement.classList.add("show");
            }, 100);
        }
    </script>
</body>
</html>
